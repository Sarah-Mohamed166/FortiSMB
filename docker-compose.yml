services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: fortismb_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: FortiSMB
      CLICKHOUSE_DB: fortismb
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  grafana:
    image: grafana/grafana:latest
    container_name: fortismb_grafana
    ports:
      - "3000:3000"
    depends_on:
      - clickhouse
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  clickhouse_data:
  grafana_data: